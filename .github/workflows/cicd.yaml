    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    steps:
      - id: "auth"
        uses: "google-github-actions/auth@v2"
        with:
          workload_identity_provider: "projects/89510231493/locations/global/workloadIdentityPools/fluxidea-pool/providers/github-provider"
      - name: "Set up Cloud SDK"
        uses: "google-github-actions/setup-gcloud@v2"
